name: Cleanup old releases

on:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Keep only 5 most recent releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ids=$(gh api repos/${{ github.repository }}/releases \
            --paginate \
            --jq 'sort_by(.created_at) | reverse | .[5:] | .[].id')

          for id in $ids; do
            tag=$(gh api repos/${{ github.repository }}/releases/$id --jq '.tag_name')
            echo "Deleting release $id (tag: $tag)"
            gh api repos/${{ github.repository }}/releases/$id --method DELETE
            gh api repos/${{ github.repository }}/git/refs/tags/$tag --method DELETE || true
          done
